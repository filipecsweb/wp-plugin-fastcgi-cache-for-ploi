name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php:
    name: PHP ${{ matrix.php }} (cs + stan + test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS (PSR-12 + WordPress security)
        run: composer cs

      - name: PHPStan (max level)
        run: composer stan

      - name: Pest (unit)
        run: composer test

  assets:
    name: Build assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify the build manifest exists
        run: test -f public/build/.vite/manifest.json

  e2e:
    name: E2E (Playwright + real WordPress)
    runs-on: ubuntu-latest
    # A real WordPress served by WP-CLI + the PHP built-in server, with the plugin
    # symlinked in — the exact shape the e2e suite expects (WP_PLUGIN_PATH points at
    # this checkout, WP_CLI_CWD drives the auto-flush/permission specs via `wp`).
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      WP_BASE_URL: http://127.0.0.1:8889
    steps:
      - uses: actions/checkout@v4

      # runner.temp isn't available in job-level env, so export WP_DIR here for
      # the run-script steps below ($WP_DIR) and later expressions (env.WP_DIR).
      - name: Resolve the WordPress directory
        run: echo "WP_DIR=$RUNNER_TEMP/wp" >> "$GITHUB_ENV"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sodium, mysqli
          tools: composer:v2, wp-cli

      - run: composer install --prefer-dist --no-progress --no-dev

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install WordPress
        run: |
          mkdir -p "$WP_DIR"
          wp core download --path="$WP_DIR" --version=latest
          wp config create --path="$WP_DIR" \
            --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306
          wp core install --path="$WP_DIR" \
            --url="$WP_BASE_URL" --title="E2E" \
            --admin_user=admin --admin_password=password \
            --admin_email=admin@example.test --skip-email

      - name: Symlink the plugin and activate
        run: |
          ln -s "$GITHUB_WORKSPACE" "$WP_DIR/wp-content/plugins/ploi-fastcgi-cache"
          wp plugin activate ploi-fastcgi-cache --path="$WP_DIR"

      - name: Start the PHP server
        run: |
          PHP_CLI_SERVER_WORKERS=8 nohup php -S 127.0.0.1:8889 -t "$WP_DIR" \
            >/tmp/php-server.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -sf "$WP_BASE_URL/wp-login.php" >/dev/null; then
              echo "WordPress is reachable at $WP_BASE_URL"
              exit 0
            fi
            sleep 1
          done
          echo "WordPress did not become reachable:" && cat /tmp/php-server.log && exit 1

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run e2e
        env:
          WP_PLUGIN_PATH: ${{ env.WP_DIR }}/wp-content/plugins/ploi-fastcgi-cache
          WP_CLI_CWD: ${{ env.WP_DIR }}
          WP_ADMIN_USER: admin
          WP_ADMIN_PASS: password
