name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php:
    name: PHP ${{ matrix.php }} (cs + stan + test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS (PSR-12 + WordPress security)
        run: composer cs

      - name: PHPStan (max level)
        run: composer stan

      - name: Pest (unit)
        run: composer test

  assets:
    name: Build assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify the build manifest exists
        run: test -f public/build/.vite/manifest.json

  e2e:
    name: E2E (Playwright + wp-env)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sodium
          tools: composer:v2

      - run: composer install --prefer-dist --no-progress --no-dev

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Start wp-env
        run: npx wp-env start

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run e2e
        env:
          WP_BASE_URL: http://localhost:8888

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop
